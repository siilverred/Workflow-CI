name: MLflow CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 dagshub matplotlib seaborn

      - name: Train Model
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: siilverred
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py \
            --n_estimators 100 \
            --max_depth 10 \
            --min_samples_split 2 \
            --min_samples_leaf 1

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/model_output/
          retention-days: 30

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker with mlflow build-docker
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/siilverred/SMSML_Charlene-Silver.mlflow
          MLFLOW_TRACKING_USERNAME: siilverred
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Ambil artifact URI dari run terbaru
          MODEL_URI=$(python -c "
          import mlflow, os
          mlflow.set_tracking_uri('https://dagshub.com/siilverred/SMSML_Charlene-Silver.mlflow')
          client = mlflow.tracking.MlflowClient()
          versions = client.search_model_versions(\"name='IBM_Attrition_Model_CharleneSilver'\")
          latest = sorted(versions, key=lambda x: int(x.version), reverse=True)[0]
          print(latest.source)
          ")
          echo "Model URI: $MODEL_URI"

          mlflow models build-docker \
            --model-uri "$MODEL_URI" \
            --name ${{ secrets.DOCKERHUB_USERNAME }}/mlops-attrition-app \
            --env-manager=local

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-attrition-app:latest