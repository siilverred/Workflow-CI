name: MLflow CI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Install Dependencies ──────────────────────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 dagshub matplotlib seaborn

      # ── 4. Run MLflow Project ────────────────────────────────────────────
      - name: Run MLflow Project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            -P n_estimators=100 \
            -P max_depth=10 \
            -P min_samples_split=2 \
            -P min_samples_leaf=1

      # ── 5. Upload Artifacts ke GitHub ────────────────────────────────────
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/model_output/
          retention-days: 30

      # ── 6. Setup Docker Buildx ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 7. Login ke Docker Hub ───────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 8. Build Docker Image pakai mlflow build-docker ──────────────────
      - name: Build and Push Docker Image
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "models:/IBM_Attrition_Model_CharleneSilver/latest" \
            --name ${{ secrets.DOCKERHUB_USERNAME }}/mlops-attrition-app \
            --env-manager=local
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlops-attrition-app:latest